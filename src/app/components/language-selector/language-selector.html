<p class="mt-10" translate="changeLanguage"></p>

<select
  class="px-3 py-2 border rounded-md bg-white dark:bg-gray-800"
  [ngModel]="currentLang()"
  (ngModelChange)="changeLanguage($event)"
>
  @for(item of languages; track item.code) {
    <option [value]="item.code">{{item.flag}} {{item.name}}</option>
  }
</select>
